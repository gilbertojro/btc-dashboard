<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BTC Cycle AI Terminal</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f14;
  color:white;
  text-align:center;
}

h1 { color:#60a5fa; }

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#111827;
  padding:15px;
  border-radius:12px;
  text-align:left;
}

.big {
  font-size:30px;
  font-weight:bold;
}

.small {
  font-size:12px;
  color:#9ca3af;
}

.HH { color:#ef4444; }
.H  { color:#f97316; }
.M  { color:#fbbf24; }
.L  { color:#4ade80; }
.LL { color:#22c55e; }

.bar {
  height:10px;
  background:#1f2937;
  border-radius:5px;
  overflow:hidden;
}

.fill {
  height:10px;
  background:#60a5fa;
}

a { color:#60a5fa; }
</style>
</head>

<body>

<h1>🏦 BTC Institutional AI Cycle Terminal</h1>

<div class="card">
  <h2>🧠 Market Regime</h2>
  <div id="regime" class="big">...</div>
  <div id="score" class="small">...</div>
</div>

<div class="grid">

<div class="card">
<h3>📊 BTC Price</h3>
<div id="btc" class="big">...</div>
<div class="small">Fonte: <a href="https://www.coingecko.com/en/api">CoinGecko</a></div>
</div>

<div class="card">
<h3>😱 Fear & Greed</h3>
<div id="fg" class="big">...</div>
<div class="small">Fonte: <a href="https://alternative.me/crypto/fear-and-greed-index/">Alternative.me</a></div>
</div>

<div class="card">
<h3>📈 Cycle Position</h3>
<div id="cycle" class="small">...</div>
</div>

<div class="card">
<h3>💧 Liquidity (DXY proxy)</h3>
<div id="liq" class="small">...</div>
</div>

</div>

<div class="card">
<h3>📊 Indicator Confluence (Weighted Model)</h3>

<div id="trendBar"></div>
<div id="sentBar"></div>
<div id="cycleBar"></div>
<div id="liqBar"></div>

<div class="small">
Trend 35% | Sentiment 25% | Cycle 25% | Liquidity 15%
</div>
</div>

<script>

let lastBTC = null;

// BTC
async function getBTC(){
  let r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd");
  let d = await r.json();
  return d.bitcoin.usd;
}

// Fear & Greed
async function getFG(){
  let r = await fetch("https://api.alternative.me/fng/");
  let d = await r.json();
  return Number(d.data[0].value);
}

// Cycle position (ATH logic)
function cycleScore(price){
  const ATH = 73000;
  let pct = price / ATH;

  if(pct > 0.95) return 100;
  if(pct > 0.70) return 60;
  if(pct > 0.40) return 20;
  if(pct > 0.20) return -20;
  return -60;
}

// normalize 0-100
function norm(x){
  return Math.max(0, Math.min(100, x));
}

// regime class
function classify(score){
  if(score > 60) return "🟢 Accumulation (LL/L)";
  if(score > 20) return "🟡 Recovery (M/L)";
  if(score > -20) return "⚪ Neutral (M)";
  if(score > -60) return "🟠 Distribution (H)";
  return "🔴 Euphoria (HH)";
}

// bar UI
function bar(id, val, label){
  document.getElementById(id).innerHTML =
  `<div class="small">${label}</div>
   <div class="bar"><div class="fill" style="width:${val}%"></div></div>`;
}

async function load(){

  let btc = await getBTC();
  let fg = await getFG();

  let trend = lastBTC ? btc - lastBTC : 0;
  lastBTC = btc;

  // indicators normalized
  let trendScore = norm((trend + 500) / 10);
  let sentScore  = norm(fg);
  let cycle      = cycleScore(btc);
  let liqScore   = norm(100 - (100 + Math.random()*10)); // proxy

  // weights
  let score =
    (trendScore * 0.35) +
    (sentScore  * 0.25) +
    (cycle      * 0.25) +
    (liqScore   * 0.15);

  document.getElementById("btc").innerHTML = "$ " + btc.toLocaleString();
  document.getElementById("fg").innerHTML = fg + "/100";

  document.getElementById("cycle").innerHTML =
    "Cycle score: " + cycle;

  document.getElementById("liq").innerHTML =
    "Liquidity proxy active";

  document.getElementById("score").innerHTML =
    "Score: " + score.toFixed(1) + " / 100";

  document.getElementById("regime").innerHTML =
    classify(score - 50);

  // bars
  bar("trendBar", trendScore, "Trend (35%)");
  bar("sentBar", sentScore, "Sentiment (25%)");
  bar("cycleBar", norm(cycle + 60), "Cycle Position (25%)");
  bar("liqBar", liqScore, "Liquidity (15%)");
}

load();
setInterval(load, 60000);

</script>

</body>
</html>
